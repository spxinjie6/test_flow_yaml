idField: data-grafana_id

controls:
  - id: memory1
    label:
      dataRef: memory_usage
    fill:
      rules:
        - condition: value <= 70
          color: green
        - condition: value > 70 && value <= 85
          color: orange
        - condition: value > 85
          color: red
    stroke:
      rules:
        - condition: true
          color: "#333"

  - id: db1
    label:
      dataRef: db_status
    fill:
      rules:
        - condition: value == 1
          color: green
        - condition: value == 0
          color: red

  - id: connect1
    label:
      dataRef: connect_speed
      suffix: " Mbps"
    stroke:
      rules:
        - condition: value > 100
          color: green
        - condition: value > 50 && value <= 100
          color: orange
        - condition: value <= 50
          color: red
    flow:
      direction: forward
      speed: 30
